<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithmic Symmetry - Creative Coding Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 110, 0.3);
            z-index: 100;
            max-width: 320px;
        }

        .controls h3 {
            color: #ff006e;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 0.75rem;
            color: #8892b8;
            margin-bottom: 5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            outline: none;
            background: rgba(255, 0, 110, 0.2);
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff006e;
            cursor: pointer;
        }

        .control-group button {
            width: 100%;
            padding: 10px;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid #ff006e;
            color: #ff006e;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .control-group button:hover {
            background: #ff006e;
            color: #0a0a0f;
        }

        .control-group button.active {
            background: #ff006e;
            color: #0a0a0f;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 190, 11, 0.3);
            font-size: 0.75rem;
            color: #8892b8;
            max-width: 400px;
        }

        .info strong {
            color: #ffbe0b;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 8px;
            color: #ff006e;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            background: #ff006e;
            color: #0a0a0f;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Portfolio</a>

    <div class="controls">
        <h3>Symmetry Controls</h3>
        <div class="control-group">
            <label>Symmetry Order: <span id="orderValue">6</span></label>
            <input type="range" id="symmetryOrder" min="3" max="24" step="1" value="6">
        </div>
        <div class="control-group">
            <label>Rotation Speed: <span id="rotSpeedValue">1.0</span></label>
            <input type="range" id="rotSpeed" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Complexity: <span id="complexValue">3</span></label>
            <input type="range" id="complexity" min="1" max="7" step="1" value="3">
        </div>
        <div class="control-group">
            <label>Amplitude: <span id="ampValue">150</span></label>
            <input type="range" id="amplitude" min="50" max="300" step="10" value="150">
        </div>
        <div class="control-group">
            <label>Pattern Preset</label>
            <button class="preset-btn active" data-preset="0">Rosette</button>
            <button class="preset-btn" data-preset="1">Mandala</button>
            <button class="preset-btn" data-preset="2">Spirograph</button>
            <button class="preset-btn" data-preset="3">Fractal Bloom</button>
        </div>
        <div class="control-group">
            <button id="resetBtn">Reset Animation</button>
        </div>
    </div>

    <div class="info">
        <strong>Mathematical Basis:</strong> Polar coordinates, harmonic oscillators, sin/cos wave interference<br>
        <strong>Symmetry Groups:</strong> Cyclic rotational symmetry (C<sub>n</sub>)<br>
        <strong>Interaction:</strong> Mouse position influences phase shift
    </div>

    <main>
        <div id="canvas-container"></div>
    </main>

    <script>
        // Global parameters
        let angle = 0;
        let symmetryOrder = 6;
        let rotSpeed = 1;
        let complexity = 3;
        let amplitude = 150;
        let preset = 0;

        // Preset configurations
        const presets = [
            { // Rosette
                order: 6,
                complexity: 3,
                amplitude: 150,
                func: (t, i) => {
                    let r = amplitude * (1 + 0.5 * sin(complexity * t));
                    return r;
                }
            },
            { // Mandala
                order: 8,
                complexity: 5,
                amplitude: 180,
                func: (t, i) => {
                    let r = amplitude * abs(sin(complexity * t / 2));
                    return r;
                }
            },
            { // Spirograph
                order: 12,
                complexity: 7,
                amplitude: 200,
                func: (t, i) => {
                    let r = amplitude * (1 + sin(complexity * t) * cos(t * 2));
                    return r;
                }
            },
            { // Fractal Bloom
                order: 16,
                complexity: 4,
                amplitude: 160,
                func: (t, i) => {
                    let r = amplitude * (0.8 + 0.4 * sin(complexity * t) + 0.2 * sin(complexity * t * 3));
                    return r;
                }
            }
        ];

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            colorMode(HSB, 360, 100, 100, 100);
            setupControls();
        }

        function draw() {
            background(210, 15, 5, 10); // Dark purple with fade
            
            translate(width / 2, height / 2);
            
            // Mouse interaction for phase shift
            let mousePhase = map(mouseX, 0, width, 0, TWO_PI);
            
            // Draw multiple layers with varying opacity
            for (let layer = 0; layer < 3; layer++) {
                let layerAngle = angle + layer * 0.5;
                let layerOpacity = map(layer, 0, 2, 80, 30);
                
                drawSymmetricPattern(layerAngle, layerOpacity, mousePhase);
            }
            
            // Increment rotation
            angle += 0.005 * rotSpeed;
            
            // Draw center ornament
            drawCenterOrnament();
        }

        function drawSymmetricPattern(baseAngle, opacity, phase) {
            let angleStep = TWO_PI / symmetryOrder;
            
            for (let i = 0; i < symmetryOrder; i++) {
                push();
                rotate(angleStep * i + baseAngle);
                
                // Draw the pattern
                beginShape();
                noFill();
                
                let steps = 200;
                for (let j = 0; j <= steps; j++) {
                    let t = map(j, 0, steps, 0, TWO_PI);
                    
                    // Get radius from current preset function
                    let r = presets[preset].func(t, i);
                    
                    // Add some noise and phase shift
                    r += 10 * sin(t * 8 + phase);
                    
                    // Convert to Cartesian coordinates
                    let x = r * cos(t);
                    let y = r * sin(t);
                    
                    // Color based on position and time
                    let hue = (180 + i * 30 + t * 50 + frameCount * 0.5) % 360;
                    let sat = map(sin(t * complexity), -1, 1, 60, 100);
                    let bright = map(j, 0, steps, 80, 100);
                    
                    stroke(hue, sat, bright, opacity);
                    strokeWeight(1.5);
                    
                    vertex(x, y);
                }
                endShape();
                pop();
            }
        }

        function drawCenterOrnament() {
            // Pulsating center circle
            let pulse = 20 + 10 * sin(frameCount * 0.05);
            
            push();
            noStroke();
            
            // Outer glow
            for (let i = 3; i > 0; i--) {
                fill(320, 80, 80, 20 / i);
                circle(0, 0, pulse * i * 1.5);
            }
            
            // Center dot
            fill(320, 90, 100);
            circle(0, 0, pulse);
            pop();
        }

        function setupControls() {
            // Symmetry order
            document.getElementById('symmetryOrder').addEventListener('input', (e) => {
                symmetryOrder = parseInt(e.target.value);
                document.getElementById('orderValue').textContent = symmetryOrder;
            });

            // Rotation speed
            document.getElementById('rotSpeed').addEventListener('input', (e) => {
                rotSpeed = parseFloat(e.target.value);
                document.getElementById('rotSpeedValue').textContent = rotSpeed.toFixed(1);
            });

            // Complexity
            document.getElementById('complexity').addEventListener('input', (e) => {
                complexity = parseInt(e.target.value);
                document.getElementById('complexValue').textContent = complexity;
            });

            // Amplitude
            document.getElementById('amplitude').addEventListener('input', (e) => {
                amplitude = parseInt(e.target.value);
                document.getElementById('ampValue').textContent = amplitude;
            });

            // Preset buttons
            document.querySelectorAll('.preset-btn').forEach((btn, idx) => {
                btn.addEventListener('click', (e) => {
                    preset = parseInt(e.target.dataset.preset);
                    
                    // Update active state
                    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    // Load preset values
                    let p = presets[preset];
                    symmetryOrder = p.order;
                    complexity = p.complexity;
                    amplitude = p.amplitude;
                    
                    // Update sliders
                    document.getElementById('symmetryOrder').value = symmetryOrder;
                    document.getElementById('complexity').value = complexity;
                    document.getElementById('amplitude').value = amplitude;
                    document.getElementById('orderValue').textContent = symmetryOrder;
                    document.getElementById('complexValue').textContent = complexity;
                    document.getElementById('ampValue').textContent = amplitude;
                });
            });

            // Reset
            document.getElementById('resetBtn').addEventListener('click', () => {
                angle = 0;
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
